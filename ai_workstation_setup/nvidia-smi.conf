# NVIDIA GPU Monitoring Configuration for Netdata
# Monitors dual NVIDIA GPUs with all metrics

jobs:
  - name: nvidia_gpus
    loop_mode: yes
    update_every: 1
    timeout: 5

    # This will auto-detect all NVIDIA GPUs
    # For dual cards, both will be monitored automatically

    # Metrics collected:
    # - GPU utilization %
    # - Memory utilization %
    # - Memory used/free (MB)
    # - Temperature (°C)
    # - Fan speed %
    # - Power draw (W)
    # - Clock speeds (MHz)
    # - Performance state
    # - ECC errors (if supported)
