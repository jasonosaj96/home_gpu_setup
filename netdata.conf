# Netdata Configuration for AI/ML Workstation Monitoring
# This configuration optimizes monitoring for dual NVIDIA GPUs

[global]
    hostname = AI Workstation
    update every = 1
    history = 3600
    memory mode = dbengine
    page cache size = 128

[web]
    default port = 19999
    bind to = *

[plugins]
    # Enable all monitoring plugins
    proc = yes
    diskspace = yes
    cgroups = yes
    tc = no
    idlejitter = yes
    apps = yes
    python.d = yes
    go.d = yes

[plugin:proc]
    # CPU, memory, network, disk monitoring
    /proc/net/dev = yes
    /proc/diskstats = yes
    /proc/meminfo = yes
    /proc/vmstat = yes

[plugin:apps]
    # Monitor specific applications
    update every = 1

[plugin:cgroups]
    # Docker container monitoring
    enable by default cgroups matching = yes
    enable running cgroups = yes
    check for new cgroups every = 10

[plugin:go.d]
    # Enable nvidia-smi collector for GPU monitoring
    nvidia_smi = yes
